<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>송파구 토지이용 대시보드</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div class="hero-copy-block">
          <p class="eyebrow">송파구 입지분석 · 토지이용</p>
          <h1>필지와 집계구를 빠르게 읽는 지도 대시보드</h1>
          <p class="hero-copy">
            필지 단위 주용도·용도지역과 집계구 단위 인구·가구를 한 화면에서 확인할 수 있게 정리했습니다.
          </p>
          <div class="hero-tips">
            <span>필터 변경 즉시 반영</span>
            <span>휠 확대/축소</span>
            <span>드래그 이동</span>
            <span>클릭 상세정보</span>
          </div>
        </div>
        <div class="meta-card" id="metaCard"></div>
      </header>

      <section class="notice" id="noticeList"></section>
      <section class="summary-grid" id="summaryGrid"></section>

      <section class="workspace">
        <div class="map-panel">
          <div class="panel-head">
            <div>
              <h2>지도</h2>
              <p id="mapSubtitle">필지 주용도 레이어</p>
            </div>
            <button id="resetViewBtn" class="ghost-btn" type="button">전체 보기</button>
          </div>

          <div class="toolbar">
            <label>
              <span>표시 항목</span>
              <select id="layerMode">
                <option value="parcel_use">필지 주용도</option>
                <option value="parcel_zoning">필지 용도지역</option>
                <option value="oa_population">집계구 인구</option>
                <option value="oa_household">집계구 가구</option>
              </select>
            </label>
            <label>
              <span>행정동</span>
              <select id="dongFilter"></select>
            </label>
            <label>
              <span>용도 필터</span>
              <select id="useFilter"></select>
            </label>
            <label class="search wide">
              <span>검색</span>
              <input id="searchInput" type="search" placeholder="PNU 또는 주소" autocomplete="off" />
            </label>
          </div>

          <div class="map-wrap">
            <canvas id="parcelCanvas" width="1120" height="760"></canvas>
            <div class="map-legend" id="legend"></div>
            <div class="map-status" id="mapStatus"></div>
          </div>
        </div>

        <aside class="side-panel">
          <section class="detail-card">
            <h3>필지 상세</h3>
            <div id="selectedParcel"></div>
          </section>

          <section class="detail-card">
            <h3>집계구 상세</h3>
            <div id="selectedOa"></div>
          </section>

          <section class="detail-card">
            <h3>현재 필터</h3>
            <div id="filterSummary"></div>
          </section>

          <section class="detail-card">
            <h3>비율 차트</h3>
            <div class="pie-grid">
              <div>
                <h4 id="parcelPieTitle">필지 비중</h4>
                <canvas id="parcelPie" width="280" height="280"></canvas>
              </div>
              <div>
                <h4 id="floorPieTitle">연면적 비중</h4>
                <canvas id="floorPie" width="280" height="280"></canvas>
              </div>
            </div>
          </section>
        </aside>
      </section>

      <section class="tables">
        <article class="table-card">
          <div class="panel-head">
            <div>
              <h2>주용도 표</h2>
              <p>필지 수와 연면적 비중</p>
            </div>
          </div>
          <div class="table-wrap"><table id="useTable"></table></div>
        </article>

        <article class="table-card">
          <div class="panel-head">
            <div>
              <h2>용도지역 표</h2>
              <p>필지 수와 연면적 비중</p>
            </div>
          </div>
          <div class="table-wrap"><table id="zoningTable"></table></div>
        </article>

        <article class="table-card">
          <div class="panel-head">
            <div>
              <h2>행정동 요약</h2>
              <p>필지 수와 연면적 현황</p>
            </div>
          </div>
          <div class="table-wrap"><table id="dongTable"></table></div>
        </article>

        <article class="table-card">
          <div class="panel-head">
            <div>
              <h2>인구 상위 집계구</h2>
              <p>상위 20개</p>
            </div>
          </div>
          <div class="table-wrap"><table id="censusPopTable"></table></div>
        </article>

        <article class="table-card">
          <div class="panel-head">
            <div>
              <h2>가구 상위 집계구</h2>
              <p>상위 20개</p>
            </div>
          </div>
          <div class="table-wrap"><table id="censusHouseholdTable"></table></div>
        </article>
      </section>
    </div>

    <script src="./data/landuse_core.js"></script>
    <script src="./data/landuse_parcels_01.js"></script>
    <script src="./data/landuse_parcels_02.js"></script>
    <script src="./data/landuse_parcels_03.js"></script>
    <script src="./data/landuse_parcels_04.js"></script>
    <script src="./data/landuse_oa_01.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
